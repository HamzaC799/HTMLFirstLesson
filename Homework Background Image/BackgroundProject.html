<!DOCTYPE html>
<html lang="en">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@800&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mountain Holiday</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#d9d9d9;
    font-family:'Nunito Sans', sans-serif;
}

.card{
    position:relative;
    width:430px;
    height:610px;
    overflow:hidden;
    border-radius:8px;

    /* Thin highlight like the reference */
    border-right:1px solid rgba(255,255,255,0.75);
    border-top:1px solid rgba(255,255,255,0.25);
}

/* Top turquoise highlight */
.card::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:6px;
    z-index:2;

    background:linear-gradient(
        90deg,
        rgba(88,216,209,0.95) 0%,
        rgba(120,220,213,0.80) 35%,
        rgba(184,221,203,0.55) 70%,
        rgba(245,244,235,0.30) 100%
    );
}

/* Image */
.card img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* Bottom dark gradient */
.card::after{
    content:"";
    position:absolute;
    left:0;
    bottom:0;
    width:100%;
    height:185px;
    z-index:1;

    background:linear-gradient(
        to top,
        rgba(0,0,0,.72) 0%,
        rgba(0,0,0,.45) 45%,
        rgba(0,0,0,0) 100%
    );
}

/* Title */
.card h1{
    position:absolute;
    left:50%;
    bottom:60px;
    transform:translateX(-50%);
    z-index:3;

    color:#fff;
    font-family:'Nunito Sans', sans-serif;
    font-size:32px;
    font-weight:800;
    letter-spacing:-0.5px;
    line-height:1;
    white-space:nowrap;

    text-shadow:0 1px 2px rgba(0,0,0,.15);
}
</style>

</head>
<body>

<div class="card">
    <img src="Mountain.jpg" alt="Mountain Holiday">
    <h1>Mountain Holiday</h1>
</div>

</body>
</html>
